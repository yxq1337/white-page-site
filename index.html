<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>白色在线页</title>
  <style>
    :root {
      --page-bg: #ffffff;
      --text: #171717;
      --muted: #737373;
      --border: #e5e5e5;
      --focus: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--page-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 6vw, 72px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 360px;
      padding: 24px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgb(0 0 0 / 8%);
      font: inherit;
      font-size: clamp(18px, 2vw, 28px);
      line-height: 1.6;
      resize: vertical;
      outline: 3px solid transparent;
      outline-offset: 4px;
    }

    textarea:focus {
      border-color: var(--focus);
      outline-color: rgb(37 99 235 / 50%);
      box-shadow: 0 0 0 4px rgb(37 99 235 / 12%), 0 24px 80px rgb(0 0 0 / 8%);
    }
  </style>
</head>
<body>
  <main>
    <section class="header" aria-labelledby="page-title">
      <h1 id="page-title">白色在线页</h1>
      <p>直接在下面输入或粘贴文字。</p>
    </section>

    <textarea lang="zh-CN" aria-label="文字编辑区" placeholder="在这里添加文字..."></textarea>
  </main>
</body>
</html>
